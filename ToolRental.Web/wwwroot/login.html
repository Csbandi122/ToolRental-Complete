<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolRental - Belepes</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            border-radius: 16px;
            padding: 40px 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-box h1 {
            font-size: 22px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .login-box .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .login-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }

        .login-input:focus {
            border-color: #1a1a2e;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: #16213e;
        }

        .login-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .error-msg {
            color: #c62828;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>ToolRental</h1>
        <div class="subtitle">Kerem a jelszot a belepeshez</div>
        <input type="password" class="login-input" id="password"
               placeholder="Jelszo"
               onkeydown="if(event.key==='Enter') doLogin()"
               autofocus>
        <button class="login-btn" id="loginBtn" onclick="doLogin()">Belepes</button>
        <div class="error-msg" id="errorMsg">Hibas jelszo</div>
    </div>

    <script>
        async function doLogin() {
            const pwd = document.getElementById('password').value.trim();
            if (!pwd) return;

            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = '...';
            err.style.display = 'none';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwd })
                });

                if (resp.ok) {
                    window.location.href = '/reporting.html';
                } else {
                    err.style.display = 'block';
                    document.getElementById('password').select();
                }
            } catch (e) {
                err.textContent = 'Szerver nem elerheto';
                err.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Belepes';
            }
        }
    </script>
</body>
</html>
</content>
</invoke>
