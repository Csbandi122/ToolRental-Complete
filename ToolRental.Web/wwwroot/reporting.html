<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolRental - Reporting</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 12px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            color: #1a1a2e;
        }

        .header .timestamp {
            color: #888;
            font-size: 13px;
            margin-top: 5px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .period {
            font-size: 12px;
            color: #aaa;
            font-weight: normal;
            text-transform: none;
            letter-spacing: 0;
        }

        .amount-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .amount-row.result-row {
            border-bottom: none;
            padding-top: 12px;
            margin-top: 4px;
            border-top: 2px solid #eee;
        }

        .invoice-row {
            border-bottom: none;
            padding: 4px 0 4px 12px;
        }

        .invoice-row .amount-label {
            font-size: 12px;
            color: #999;
        }

        .invoice-row .amount-value {
            font-size: 14px;
            font-weight: 500;
        }

        .invoiced { color: #2e7d32; }
        .uninvoiced { color: #e65100; }

        .pct {
            font-size: 12px;
            font-weight: 400;
            color: #999;
        }

        .amount-label {
            font-size: 14px;
            color: #666;
        }

        .amount-value {
            font-size: 18px;
            font-weight: 600;
        }

        .revenue { color: #2e7d32; }
        .expense { color: #c62828; }
        .profit-positive { color: #1565c0; }
        .profit-negative { color: #c62828; }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 16px;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #c62828;
            background: #ffebee;
            border-radius: 12px;
            max-width: 600px;
            margin: 40px auto;
        }

        .refresh-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 24px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background: #16213e;
        }

        /* === AI KÉRDEZŐ === */
        .ai-section {
            max-width: 1000px;
            margin: 30px auto 0;
        }

        .ai-section h2 {
            font-size: 18px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .ai-input-row {
            display: flex;
            gap: 8px;
        }

        .ai-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .ai-input:focus {
            border-color: #1a1a2e;
        }

        .ai-input::placeholder {
            color: #aaa;
        }

        .ai-send-btn {
            padding: 12px 20px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            white-space: nowrap;
        }

        .ai-send-btn:hover {
            background: #16213e;
        }

        .ai-send-btn:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .ai-result {
            margin-top: 16px;
            padding: 16px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: none;
        }

        .ai-answer {
            font-size: 15px;
            line-height: 1.6;
            color: #333;
            white-space: pre-wrap;
        }

        .ai-sql {
            margin-top: 12px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #666;
            overflow-x: auto;
        }

        .ai-sql-toggle {
            margin-top: 8px;
            background: none;
            border: none;
            color: #888;
            font-size: 12px;
            cursor: pointer;
            text-decoration: underline;
        }

        .ai-loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #888;
            font-size: 14px;
            padding: 16px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #eee;
            border-top-color: #1a1a2e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .ai-examples {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .ai-example {
            padding: 6px 12px;
            background: #e8eaf6;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            color: #3949ab;
            cursor: pointer;
        }

        .ai-example:hover {
            background: #c5cae9;
        }

        /* === ÉVES STATISZTIKA === */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            max-width: 1000px;
            margin: 0 auto 28px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 18px 16px 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .stat-card .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-card .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #999;
        }

        .stat-card .stat-sub {
            font-size: 11px;
            color: #bbb;
            margin-top: 3px;
        }

        .stat-card.accent-blue .stat-value { color: #1565c0; }
        .stat-card.accent-green .stat-value { color: #2e7d32; }
        .stat-card.accent-orange .stat-value { color: #e65100; }
        .stat-card.accent-red .stat-value { color: #c62828; }
        .stat-card.accent-purple .stat-value { color: #6a1b9a; }

        /* === ADÓ TÁBLÁZAT === */
        .tax-section {
            max-width: 1000px;
            margin: 0 auto 28px;
        }

        .tax-section h2 {
            font-size: 16px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        .tax-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            font-size: 14px;
        }

        .tax-table th {
            background: #1a1a2e;
            color: white;
            padding: 10px 14px;
            text-align: right;
            font-weight: 500;
            font-size: 13px;
        }

        .tax-table th:first-child {
            text-align: left;
        }

        .tax-table td {
            padding: 8px 14px;
            border-bottom: 1px solid #f0f0f0;
            text-align: right;
            color: #333;
        }

        .tax-table td:first-child {
            text-align: left;
            color: #666;
            font-size: 13px;
        }

        .tax-table tr:last-child td {
            border-bottom: none;
            font-weight: 600;
            border-top: 2px solid #eee;
            color: #c62828;
        }

        .tax-table tr:last-child td:first-child {
            color: #c62828;
        }

        .tax-table .zero {
            color: #ccc;
        }

        @media (max-width: 768px) {
            .stats-strip { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 500px) {
            .stats-strip { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ToolRental Reporting</h1>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <div class="stats-strip" id="statsStrip" style="display:none;">
        <div class="stat-card accent-blue">
            <div class="stat-value" id="statRentals">—</div>
            <div class="stat-label">Összes bérlés</div>
            <div class="stat-sub" id="statRentalsYear"></div>
        </div>
        <div class="stat-card accent-green">
            <div class="stat-value" id="statBikes">—</div>
            <div class="stat-label">Kiadott biciklik</div>
            <div class="stat-sub" id="statBikesYear"></div>
        </div>
        <div class="stat-card accent-orange">
            <div class="stat-value" id="statKm">—</div>
            <div class="stat-label">Becsült km</div>
            <div class="stat-sub">30 km/kör × biciklik</div>
        </div>
        <div class="stat-card accent-red">
            <div class="stat-value" id="statDefekt">—</div>
            <div class="stat-label">Defektek</div>
            <div class="stat-sub" id="statDefektYear"></div>
        </div>
        <div class="stat-card accent-purple">
            <div class="stat-value" id="statWorkTime">—</div>
            <div class="stat-label">Szervíz munkaóra</div>
            <div class="stat-sub" id="statWorkTimeYear"></div>
        </div>
    </div>

    <div class="tax-section" id="taxSection" style="display:none;">
        <h2>Becsult negyedeves adobevallasos adofizetesi kotelezettsg</h2>
        <table class="tax-table">
            <thead>
                <tr>
                    <th></th>
                    <th>Q1</th>
                    <th>Q2</th>
                    <th>Q3</th>
                    <th>Q4</th>
                </tr>
            </thead>
            <tbody id="taxBody"></tbody>
        </table>
    </div>

    <div id="content">
        <div class="loading">Adatok betoltese...</div>
    </div>

    <button class="refresh-btn" onclick="loadData()">Frissites</button>

    <!-- AI KÉRDEZŐ SZEKCIÓ -->
    <div class="ai-section">
        <h2>Kerdezz az adatbazisrol</h2>
        <div class="ai-input-row">
            <input type="text" class="ai-input" id="aiQuestion"
                   placeholder="Pl.: Hany berlest adtunk ki ma?"
                   onkeydown="if(event.key==='Enter') askAI()">
            <button class="ai-send-btn" id="aiSendBtn" onclick="askAI()">Kerdes</button>
        </div>
        <div class="ai-examples" id="recentQuestions"></div>
        <div id="aiResult" class="ai-result"></div>
    </div>

    <script>
        function formatMoney(amount) {
            return Math.round(amount).toLocaleString('hu-HU') + ' Ft';
        }

        function createCard(title, icon, period, data) {
            const profitClass = data.profit >= 0 ? 'profit-positive' : 'profit-negative';
            const profitSign = data.profit >= 0 ? '+' : '';

            const invTotal = (data.invoiced || 0) + (data.uninvoiced || 0);
            const invPct = invTotal > 0 ? Math.round(data.invoiced / invTotal * 100) : 0;
            const uninvPct = invTotal > 0 ? Math.round(data.uninvoiced / invTotal * 100) : 0;

            return `
                <div class="card">
                    <div class="card-title">
                        ${title}
                        ${period ? `<span class="period">(${period})</span>` : ''}
                    </div>
                    <div class="amount-row">
                        <span class="amount-label">Bevetel</span>
                        <span class="amount-value revenue">${formatMoney(data.revenue)}</span>
                    </div>
                    <div class="amount-row">
                        <span class="amount-label">Kiadas</span>
                        <span class="amount-value expense">${formatMoney(data.expense)}</span>
                    </div>
                    <div class="amount-row result-row">
                        <span class="amount-label">Eredmeny</span>
                        <span class="amount-value ${profitClass}">${profitSign}${formatMoney(data.profit)}</span>
                    </div>
                    <div class="amount-row invoice-row">
                        <span class="amount-label">Szamlazott</span>
                        <span class="amount-value invoiced">${formatMoney(data.invoiced || 0)} <span class="pct">(${invPct}%)</span></span>
                    </div>
                    <div class="amount-row invoice-row">
                        <span class="amount-label">Szamlazatlan</span>
                        <span class="amount-value uninvoiced">${formatMoney(data.uninvoiced || 0)} <span class="pct">(${uninvPct}%)</span></span>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const content = document.getElementById('content');
            const timestamp = document.getElementById('timestamp');

            try {
                const response = await fetch('/api/reporting');
                if (!response.ok) throw new Error('Szerver hiba: ' + response.status);

                const data = await response.json();

                timestamp.textContent = 'Frissitve: ' + data.generatedAt;

                content.innerHTML = `
                    <div class="cards">
                        ${createCard('Mai nap', '', '', data.today)}
                        ${createCard('Aktualis het', '', data.week.startDate + ' -', data.week)}
                        ${createCard('Aktualis honap', '', data.month.startDate + ' -', data.month)}
                        ${createCard('Aktualis ev', '', data.year.startDate + ' -', data.year)}
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Hiba tortent</strong><br><br>
                        ${err.message}<br><br>
                        Ellenorizd, hogy az SQL szerver elerheto-e.
                    </div>
                `;
            }
        }

        function setQuestion(q) {
            document.getElementById('aiQuestion').value = q;
            askAI();
        }

        async function askAI() {
            const input = document.getElementById('aiQuestion');
            const btn = document.getElementById('aiSendBtn');
            const resultDiv = document.getElementById('aiResult');
            const question = input.value.trim();

            if (!question) return;

            btn.disabled = true;
            btn.textContent = '...';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<div class="ai-loading"><div class="spinner"></div>Claude gondolkodik...</div>';

            try {
                const response = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                let html = `<div class="ai-answer">${data.answer}</div>`;

                if (data.sql) {
                    html += `<button class="ai-sql-toggle" onclick="this.nextElementSibling.style.display = this.nextElementSibling.style.display === 'none' ? 'block' : 'none'">SQL megtekintese</button>`;
                    html += `<div class="ai-sql" style="display:none">${data.sql}</div>`;
                }

                resultDiv.innerHTML = html;
                loadRecentQuestions();
            } catch (err) {
                resultDiv.innerHTML = `<div class="ai-answer" style="color:#c62828">Hiba: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Kerdes';
            }
        }

        async function loadRecentQuestions() {
            try {
                const response = await fetch('/api/recent-questions');
                const questions = await response.json();
                const container = document.getElementById('recentQuestions');

                if (questions.length === 0) {
                    container.innerHTML = '';
                    return;
                }

                container.innerHTML = questions.map(q =>
                    `<button class="ai-example" onclick="setQuestion('${q.replace(/'/g, "\\'")}')">${q.length > 50 ? q.substring(0, 50) + '...' : q}</button>`
                ).join('');
            } catch (err) {
                // Ha nem sikerül, nem gond
            }
        }

        async function loadStats() {
            try {
                const resp = await fetch('/api/stats');
                if (!resp.ok) return;
                const d = await resp.json();

                document.getElementById('statRentals').textContent = d.totalRentals.toLocaleString('hu-HU');
                document.getElementById('statBikes').textContent = d.bikesRented.toLocaleString('hu-HU');
                document.getElementById('statKm').textContent = d.kmEstimate.toLocaleString('hu-HU') + ' km';
                document.getElementById('statRentalsYear').textContent = d.year + '-ban';
                document.getElementById('statBikesYear').textContent = d.year + '-ban';
                document.getElementById('statDefekt').textContent = d.defektCount.toLocaleString('hu-HU');
                document.getElementById('statDefektYear').textContent = d.year + '-ban';
                document.getElementById('statWorkTime').textContent = d.repairHours + 'ó ' + d.repairMinutes + 'p';
                document.getElementById('statWorkTimeYear').textContent = d.year + '-ban';
                document.getElementById('statsStrip').style.display = 'grid';
            } catch (e) { /* csendben ha nem megy */ }
        }

        function taxCell(val) {
            if (val === 0) return '<td class="zero">0 Ft</td>';
            return `<td>${formatMoney(val)}</td>`;
        }

        async function loadTaxEstimate() {
            try {
                const resp = await fetch('/api/tax-estimate');
                if (!resp.ok) return;
                const d = await resp.json();
                const q = d.quarters;

                const rows = [
                    { label: 'Adokoteles bevetel', key: 'taxableRevenue' },
                    { label: 'SZJA (15%)', key: 'szja' },
                    { label: 'TB (13%)', key: 'tb' },
                    { label: 'SZOCHO (18,5%)', key: 'szocho' },
                    { label: 'Osszesen', key: 'total' }
                ];

                document.getElementById('taxBody').innerHTML = rows.map(r =>
                    `<tr><td>${r.label}</td>${q.map(qi => taxCell(qi[r.key])).join('')}</tr>`
                ).join('');

                document.getElementById('taxSection').style.display = 'block';
            } catch (e) { /* csendben ha nem megy */ }
        }

        // Automatikus betoltes indulaskor
        loadData();
        loadStats();
        loadTaxEstimate();
        loadRecentQuestions();
    </script>
</body>
</html>
