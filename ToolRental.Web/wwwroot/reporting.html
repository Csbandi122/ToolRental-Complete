<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolRental - Reporting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            color: #1a1a2e;
        }

        .header .timestamp {
            color: #888;
            font-size: 13px;
            margin-top: 5px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-title .icon {
            font-size: 20px;
        }

        .card-title .period {
            font-size: 12px;
            color: #aaa;
            font-weight: normal;
            text-transform: none;
            letter-spacing: 0;
        }

        .amount-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .amount-row:last-child {
            border-bottom: none;
            padding-top: 12px;
            margin-top: 4px;
            border-top: 2px solid #eee;
        }

        .amount-label {
            font-size: 14px;
            color: #666;
        }

        .amount-value {
            font-size: 18px;
            font-weight: 600;
        }

        .revenue { color: #2e7d32; }
        .expense { color: #c62828; }
        .profit-positive { color: #1565c0; }
        .profit-negative { color: #c62828; }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 16px;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #c62828;
            background: #ffebee;
            border-radius: 12px;
            max-width: 600px;
            margin: 40px auto;
        }

        .refresh-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 24px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .refresh-btn:hover {
            background: #16213e;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ToolRental Reporting</h1>
        <div class="timestamp" id="timestamp"></div>
    </div>

    <div id="content">
        <div class="loading">Adatok betoltese...</div>
    </div>

    <button class="refresh-btn" onclick="loadData()">Frissites</button>

    <script>
        function formatMoney(amount) {
            return Math.round(amount).toLocaleString('hu-HU') + ' Ft';
        }

        function createCard(title, icon, period, data) {
            const profitClass = data.profit >= 0 ? 'profit-positive' : 'profit-negative';
            const profitSign = data.profit >= 0 ? '+' : '';

            return `
                <div class="card">
                    <div class="card-title">
                        <span class="icon">${icon}</span>
                        ${title}
                        ${period ? `<span class="period">(${period})</span>` : ''}
                    </div>
                    <div class="amount-row">
                        <span class="amount-label">Bevetel</span>
                        <span class="amount-value revenue">${formatMoney(data.revenue)}</span>
                    </div>
                    <div class="amount-row">
                        <span class="amount-label">Kiadas</span>
                        <span class="amount-value expense">${formatMoney(data.expense)}</span>
                    </div>
                    <div class="amount-row">
                        <span class="amount-label">Eredmeny</span>
                        <span class="amount-value ${profitClass}">${profitSign}${formatMoney(data.profit)}</span>
                    </div>
                </div>
            `;
        }

        async function loadData() {
            const content = document.getElementById('content');
            const timestamp = document.getElementById('timestamp');

            try {
                const response = await fetch('/api/reporting');
                if (!response.ok) throw new Error('Szerver hiba: ' + response.status);

                const data = await response.json();

                timestamp.textContent = 'Frissitve: ' + data.generatedAt;

                content.innerHTML = `
                    <div class="cards">
                        ${createCard('Mai nap', '', '', data.today)}
                        ${createCard('Aktualis het', '', data.week.startDate + ' -', data.week)}
                        ${createCard('Aktualis honap', '', data.month.startDate + ' -', data.month)}
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `
                    <div class="error">
                        <strong>Hiba tortent</strong><br><br>
                        ${err.message}<br><br>
                        Ellenorizd, hogy az SQL szerver elerheto-e.
                    </div>
                `;
            }
        }

        // Automatikus betoltes indulaskor
        loadData();
    </script>
</body>
</html>
