<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Kerékpár Kölcsönző</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: #1a1a2e;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid #2a2a4a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #c8d6f5;
      letter-spacing: 0.02em;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    .db-toggle {
      border: 1px solid #4f4f7d;
      background: #23233d;
      color: #d8deff;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      border-radius: 999px;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .db-toggle:active {
      transform: scale(0.97);
    }

    .db-toggle.mode-prod {
      border-color: #2f8f5b;
      color: #b8ffd8;
    }

    .db-toggle.mode-test {
      border-color: #d48b2f;
      color: #ffe0b0;
    }

    .header-info {
      font-size: 0.75rem;
      color: #7070a0;
      text-align: right;
    }

    .refresh-btn {
      background: #2a2a4a;
      border: none;
      color: #9090d0;
      font-size: 1.1rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.2s;
    }

    .refresh-btn:active {
      background: #3a3a6a;
      transform: scale(0.92);
    }

    .refresh-btn.spinning {
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .stats-bar {
      background: #1a1a2e;
      padding: 10px 16px;
      display: flex;
      gap: 16px;
      border-bottom: 1px solid #2a2a4a;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1.5px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .stat-item:active {
      transform: scale(0.96);
    }

    .stat-item.active-filter {
      background: #2a2a4a;
    }

    .stat-item.active-filter.filter-free {
      border-color: #22c55e;
    }

    .stat-item.active-filter.filter-reserved {
      border-color: #7c3aed;
    }

    .stat-item.active-filter.filter-occupied {
      border-color: #5a5a8a;
    }

    .filter-hint {
      font-size: 0.68rem;
      color: #4a4a6a;
      margin-left: auto;
      align-self: center;
      font-style: italic;
    }

    .type-summary {
      background: #14142a;
      border-bottom: 1px solid #2a2a4a;
      padding: 10px 16px;
      display: none;
    }

    .type-summary.visible {
      display: block;
    }

    .type-summary-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #5a5a8a;
      margin-bottom: 8px;
    }

    .type-summary-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .type-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #1e1e38;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 0.78rem;
    }

    .type-chip .chip-count {
      font-weight: 700;
      color: #c8d6f5;
    }

    .type-chip .chip-label {
      color: #7070a0;
    }

    .type-chip.chip-free { border-left: 3px solid #22c55e; }
    .type-chip.chip-reserved { border-left: 3px solid #7c3aed; }
    .type-chip.chip-occupied { border-left: 3px solid #4a4a6a; }
    .type-chip.chip-active { background: #2a2a50; outline: 1.5px solid #7070c0; }

    .stat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .stat-dot.free { background: #22c55e; }
    .stat-dot.reserved { background: #7c3aed; }
    .stat-dot.occupied { background: #4a4a6a; }

    .stat-count {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .stat-label {
      color: #7070a0;
    }

    .type-section {
      margin: 0;
    }

    .type-header {
      padding: 10px 16px 6px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #5a5a8a;
      background: #0f0f1a;
      position: sticky;
      top: 61px;
      z-index: 50;
    }

    .bikes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 6px 10px 10px;
    }

    .bike-card {
      border-radius: 12px;
      overflow: hidden;
      border: 2.5px solid transparent;
      background: #1a1a2e;
      transition: border-color 0.3s, filter 0.3s, opacity 0.3s;
      position: relative;
      cursor: default;
    }

    .bike-card.free {
      border-color: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.25), 0 2px 8px rgba(0,0,0,0.3);
    }

    .bike-card.occupied {
      border-color: #c08a3f;
      background: linear-gradient(180deg, #1d1b2a 0%, #171724 100%);
      box-shadow: 0 0 0 1px rgba(192, 138, 63, 0.12), 0 2px 10px rgba(0,0,0,0.35);
    }

    .bike-card.reserved {
      border-color: #7c3aed;
      background: linear-gradient(180deg, #1a1630 0%, #150f28 100%);
      box-shadow: 0 0 10px rgba(124, 58, 237, 0.22), 0 2px 8px rgba(0,0,0,0.3);
    }

    .bike-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #12121f;
      overflow: hidden;
    }

    .bike-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bike-card.occupied .bike-image-wrap img {
      filter: grayscale(35%) brightness(0.72);
    }

    .bike-card.reserved .bike-image-wrap img {
      filter: saturate(0.7) brightness(0.85);
    }

    .no-image {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: #3a3a5a;
    }

    .occupied-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px;
      background: linear-gradient(180deg, rgba(10, 10, 20, 0.32) 0%, rgba(10, 10, 20, 0.05) 45%, rgba(10, 10, 20, 0.12) 100%);
    }

    .occupied-badge {
      background: rgba(27, 20, 10, 0.84);
      color: #ffd6a1;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 9px;
      border-radius: 20px;
      border: 1px solid rgba(255, 193, 103, 0.5);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .reserved-badge {
      background: rgba(15, 8, 35, 0.88);
      color: #c4b5fd;
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 4px 9px;
      border-radius: 20px;
      border: 1px solid rgba(167, 139, 250, 0.5);
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .bike-info {
      padding: 8px 8px 4px;
    }

    .bike-name {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.3;
      color: #d0d0f0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .bike-card.occupied .bike-name {
      color: #f1ecff;
    }

    .bike-card.reserved .bike-name {
      color: #ddd6fe;
    }

    .bike-meta {
      margin-top: 6px;
      display: grid;
      gap: 3px;
      font-size: 0.68rem;
      color: #8d8db8;
      line-height: 1.3;
    }

    .bike-meta-row strong {
      color: #c8d6f5;
      font-weight: 700;
    }

    .bike-card.occupied .bike-meta {
      color: #d0c7e6;
    }

    .bike-card.occupied .bike-meta-row strong {
      color: #ffdcae;
    }

    .bike-card.reserved .bike-meta {
      color: #c4b5fd;
    }

    .bike-actions {
      padding: 4px 8px 8px;
    }

    .release-btn {
      width: 100%;
      padding: 7px;
      border: none;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      letter-spacing: 0.03em;
    }

    .release-btn:active {
      transform: scale(0.96);
    }

    .release-btn.btn-release {
      background: #d6b98a;
      color: #24190b;
    }

    .release-btn.btn-release:hover {
      background: #e4c99b;
    }

    .release-btn.btn-free {
      background: #1f2d1f;
      color: #4a7a4a;
      cursor: default;
      opacity: 0.5;
    }

    .release-btn.btn-reserve {
      background: #2d1f4a;
      color: #c4b5fd;
      border: 1px solid #5b21b6;
    }

    .release-btn.btn-reserve:hover {
      background: #3b2860;
    }

    .release-btn.btn-unreserve {
      background: #7c3aed;
      color: #fff;
    }

    .release-btn.btn-unreserve:hover {
      background: #6d28d9;
    }

    .release-btn:disabled {
      cursor: default;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15, 15, 26, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 12px;
    }

    .loading-overlay.hidden { display: none; }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a2a4a;
      border-top-color: #6060d0;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-text {
      color: #7070a0;
      font-size: 0.85rem;
    }

    .error-banner {
      background: #2d1a1a;
      border: 1px solid #7a2a2a;
      color: #f08080;
      padding: 12px 16px;
      margin: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .error-banner.visible { display: block; }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: #4a4a7a;
    }

    .empty-state svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a4a;
      color: #c8d6f5;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 500;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.success { border-left: 3px solid #22c55e; }
    .toast.error { border-left: 3px solid #ef4444; }

    @media (min-width: 600px) {
      .bikes-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (min-width: 900px) {
      .bikes-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Betöltés...</div>
</div>

<div class="toast" id="toast"></div>

<header>
  <div class="header-left">
    <h1>🚲 Kerékpárok</h1>
    <button class="db-toggle mode-prod" id="dbToggleBtn" type="button">PROD</button>
  </div>
  <div class="header-right">
    <button class="refresh-btn" id="refreshBtn" title="Frissítés">↻</button>
  </div>
</header>

<div class="stats-bar" id="statsBar" style="display:none;">
  <div class="stat-item filter-free" id="filterFreeBtn">
    <div class="stat-dot free"></div>
    <span class="stat-count" id="freeCount">0</span>
    <span class="stat-label">szabad</span>
  </div>
  <div class="stat-item filter-reserved" id="filterReservedBtn">
    <div class="stat-dot reserved"></div>
    <span class="stat-count" id="reservedCount">0</span>
    <span class="stat-label">foglalt</span>
  </div>
  <div class="stat-item filter-occupied" id="filterOccupiedBtn">
    <div class="stat-dot occupied"></div>
    <span class="stat-count" id="occupiedCount">0</span>
    <span class="stat-label">kiadva</span>
  </div>
  <span class="filter-hint" id="filterHint">szűréshez kattints</span>
</div>

<div class="error-banner" id="errorBanner"></div>

<div class="type-summary" id="typeSummary">
  <div class="type-summary-title" id="typeSummaryTitle"></div>
  <div class="type-summary-grid" id="typeSummaryGrid"></div>
</div>

<div id="content"></div>

<script>
  const TYPE_ORDER = [
    'Férfi kerékpár',
    'Női kerékpár',
    'Férfi e-bike',
    'Női e-bike',
    'Gyerekbicikli',
    'Gyerekülés',
    'Utánfutó'
  ];

  const TYPE_ICONS = {
    'Férfi kerékpár': '🚲',
    'Női kerékpár': '🚲',
    'Férfi e-bike': '⚡',
    'Női e-bike': '⚡',
    'Gyerekbicikli': '🔵',
    'Gyerekülés': '👶',
    'Utánfutó': '🚛'
  };

  let allBikes = [];
  let releasing = new Set();
  let reserving = new Set();
  let activeFilter = null;     // null | 'free' | 'reserved' | 'occupied'
  let activeTypeFilter = null;
  let currentDbMode = localStorage.getItem('toolrental-bikes-db-mode') === 'test' ? 'test' : 'prod';

  function updateDbToggle() {
    const btn = document.getElementById('dbToggleBtn');
    btn.textContent = currentDbMode === 'test' ? 'TEST' : 'PROD';
    btn.classList.toggle('mode-prod', currentDbMode === 'prod');
    btn.classList.toggle('mode-test', currentDbMode === 'test');
    btn.title = currentDbMode === 'test'
      ? 'Jelenleg a TEST adatbázist használod'
      : 'Jelenleg a PROD adatbázist használod';
  }

  function apiUrl(path) {
    const separator = path.includes('?') ? '&' : '?';
    return `${path}${separator}db=${currentDbMode}`;
  }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type}`;
    void t.offsetWidth;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg;
    b.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorBanner').classList.remove('visible');
  }

  function setLoading(on) {
    document.getElementById('loading').classList.toggle('hidden', !on);
  }

  async function loadBikes(silent = false) {
    if (!silent) setLoading(true);
    hideError();

    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');

    try {
      const resp = await fetch(apiUrl('/api/bikes/status'));
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      allBikes = data.items || [];
      renderBikes(allBikes);
    } catch (e) {
      showError('Nem sikerült betölteni az adatokat. Ellenőrizd a kapcsolatot.');
      console.error(e);
    } finally {
      setLoading(false);
      btn.classList.remove('spinning');
    }
  }

  function bikeState(bike) {
    if (bike.isOccupied) return 'occupied';
    if (bike.isReserved) return 'reserved';
    return 'free';
  }

  function setFilter(f) {
    activeFilter = activeFilter === f ? null : f;
    activeTypeFilter = null;
    document.getElementById('filterFreeBtn').classList.toggle('active-filter', activeFilter === 'free');
    document.getElementById('filterReservedBtn').classList.toggle('active-filter', activeFilter === 'reserved');
    document.getElementById('filterOccupiedBtn').classList.toggle('active-filter', activeFilter === 'occupied');
    const hint = document.getElementById('filterHint');
    hint.textContent = activeFilter ? 'szűrő aktív — újra kattintva törlöd' : 'szűréshez kattints';
    renderBikes(allBikes);
  }

  function setTypeFilter(typeName) {
    activeTypeFilter = activeTypeFilter === typeName ? null : typeName;
    renderBikes(allBikes);
  }

  function renderTypeSummary(bikes) {
    const summary = document.getElementById('typeSummary');
    if (!activeFilter) {
      summary.classList.remove('visible');
      return;
    }

    const filtered = bikes.filter(b => bikeState(b) === activeFilter);
    const total = filtered.length;
    const chipClass = activeFilter === 'free' ? 'chip-free'
                    : activeFilter === 'reserved' ? 'chip-reserved'
                    : 'chip-occupied';
    const title = activeFilter === 'free'
      ? `${total} szabad kerékpár típusonként:`
      : activeFilter === 'reserved'
      ? `${total} foglalt kerékpár típusonként:`
      : `${total} kiadott kerékpár típusonként:`;

    const counts = {};
    for (const bike of filtered) {
      counts[bike.typeName] = (counts[bike.typeName] || 0) + 1;
    }

    const chips = TYPE_ORDER
      .filter(t => counts[t])
      .map(t => {
        const isActive = activeTypeFilter === t;
        return `<div class="type-chip ${chipClass}${isActive ? ' chip-active' : ''}" data-type="${escHtml(t)}" style="cursor:pointer;">
          <span class="chip-count">${counts[t]} db</span>
          <span class="chip-label">${t}</span>
          ${isActive ? '<span style="margin-left:3px;font-size:0.7rem;opacity:0.7;">✕</span>' : ''}
        </div>`;
      })
      .join('');

    document.getElementById('typeSummaryTitle').textContent = title;
    document.getElementById('typeSummaryGrid').innerHTML = chips;
    summary.classList.add('visible');

    document.querySelectorAll('[data-type]').forEach(el => {
      el.addEventListener('click', () => setTypeFilter(el.dataset.type));
    });
  }

  function renderBikes(bikes) {
    const content = document.getElementById('content');

    const freeCount = bikes.filter(b => bikeState(b) === 'free').length;
    const reservedCount = bikes.filter(b => bikeState(b) === 'reserved').length;
    const occupiedCount = bikes.filter(b => bikeState(b) === 'occupied').length;

    document.getElementById('freeCount').textContent = freeCount;
    document.getElementById('reservedCount').textContent = reservedCount;
    document.getElementById('occupiedCount').textContent = occupiedCount;
    document.getElementById('statsBar').style.display = 'flex';
    renderTypeSummary(bikes);

    let filtered = activeFilter
      ? bikes.filter(b => bikeState(b) === activeFilter)
      : bikes;
    if (activeTypeFilter) filtered = filtered.filter(b => b.typeName === activeTypeFilter);

    if (filtered.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 12h8M12 8v8"/>
          </svg>
          <p>${activeFilter ? 'Nincs ilyen állapotú kerékpár.' : 'Nincs megjeleníthető eszköz.'}</p>
        </div>`;
      return;
    }

    const grouped = {};
    for (const bike of filtered) {
      if (!grouped[bike.typeName]) grouped[bike.typeName] = [];
      grouped[bike.typeName].push(bike);
    }

    const orderedTypes = TYPE_ORDER.filter(t => grouped[t]);

    let html = '';
    for (const typeName of orderedTypes) {
      const group = grouped[typeName];
      const icon = TYPE_ICONS[typeName] || '🚲';
      html += `<div class="type-section">
        <div class="type-header">${icon} ${typeName}</div>
        <div class="bikes-grid">`;
      for (const bike of group) {
        html += renderCard(bike);
      }
      html += `</div></div>`;
    }

    content.innerHTML = html;

    content.querySelectorAll('[data-release-id]').forEach(btn => {
      btn.addEventListener('click', () => handleRelease(parseInt(btn.dataset.releaseId)));
    });
    content.querySelectorAll('[data-reserve-id]').forEach(btn => {
      btn.addEventListener('click', () => handleReserve(parseInt(btn.dataset.reserveId)));
    });
    content.querySelectorAll('[data-unreserve-id]').forEach(btn => {
      btn.addEventListener('click', () => handleUnreserve(parseInt(btn.dataset.unreserveId)));
    });
  }

  function renderCard(bike) {
    const state = bikeState(bike);
    const imgSrc = bike.hasImage ? apiUrl(`/api/bikes/image/${bike.id}`) : null;

    const imageHtml = imgSrc
      ? `<img src="${imgSrc}" alt="${escHtml(bike.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'>🚲</div>'" />`
      : `<div class="no-image">🚲</div>`;

    const overlayHtml = state === 'occupied'
      ? `<div class="occupied-overlay"><span class="occupied-badge">Kiadva</span></div>`
      : state === 'reserved'
      ? `<div class="occupied-overlay"><span class="reserved-badge">Foglalva</span></div>`
      : '';

    const metaHtml = state === 'occupied' ? `
      <div class="bike-meta">
        <div class="bike-meta-row"><strong>Bérlés:</strong> ${escHtml(bike.currentTicketNr || '')}</div>
        <div class="bike-meta-row"><strong>Ügyfél:</strong> ${escHtml(bike.currentCustomerName || '')}</div>
        <div class="bike-meta-row"><strong>Lejárat:</strong> ${escHtml(bike.plannedEndDate || '')}</div>
      </div>` : '';

    const btnHtml = state === 'occupied'
      ? `<button class="release-btn btn-release" data-release-id="${bike.id}">Bérlés lezárása ↩</button>`
      : state === 'reserved'
      ? `<button class="release-btn btn-unreserve" data-unreserve-id="${bike.id}">Foglalás törlése ✕</button>`
      : `<button class="release-btn btn-reserve" data-reserve-id="${bike.id}">Foglalás 🔒</button>`;

    return `
      <div class="bike-card ${state}" id="card-${bike.id}">
        <div class="bike-image-wrap">
          ${imageHtml}
          ${overlayHtml}
        </div>
        <div class="bike-info">
          <div class="bike-name">${escHtml(bike.name)}</div>
          ${metaHtml}
        </div>
        <div class="bike-actions">${btnHtml}</div>
      </div>`;
  }

  function escHtml(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function handleRelease(id) {
    if (releasing.has(id)) return;
    releasing.add(id);
    const btn = document.querySelector(`[data-release-id="${id}"]`);
    if (btn) { btn.textContent = 'Lezárás...'; btn.disabled = true; }
    try {
      const resp = await fetch(apiUrl(`/api/bikes/${id}/release`), { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      await loadBikes(true);
      showToast('Bérlés sikeresen lezárva!', 'success');
    } catch (e) {
      showToast('Hiba! Próbáld újra.', 'error');
      if (btn) { btn.textContent = 'Bérlés lezárása ↩'; btn.disabled = false; }
    } finally {
      releasing.delete(id);
    }
  }

  async function handleReserve(id) {
    if (reserving.has(id)) return;
    reserving.add(id);
    const btn = document.querySelector(`[data-reserve-id="${id}"]`);
    if (btn) { btn.textContent = 'Foglalás...'; btn.disabled = true; }
    try {
      const resp = await fetch(apiUrl(`/api/bikes/${id}/reserve`), { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      await loadBikes(true);
      showToast('Eszköz foglaltra állítva!', 'success');
    } catch (e) {
      showToast('Hiba! Próbáld újra.', 'error');
      if (btn) { btn.textContent = 'Foglalás 🔒'; btn.disabled = false; }
    } finally {
      reserving.delete(id);
    }
  }

  async function handleUnreserve(id) {
    if (reserving.has(id)) return;
    reserving.add(id);
    const btn = document.querySelector(`[data-unreserve-id="${id}"]`);
    if (btn) { btn.textContent = 'Törlés...'; btn.disabled = true; }
    try {
      const resp = await fetch(apiUrl(`/api/bikes/${id}/unreserve`), { method: 'POST' });
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      await loadBikes(true);
      showToast('Foglalás törölve.', 'success');
    } catch (e) {
      showToast('Hiba! Próbáld újra.', 'error');
      if (btn) { btn.textContent = 'Foglalás törlése ✕'; btn.disabled = false; }
    } finally {
      reserving.delete(id);
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', () => loadBikes(true));
  document.getElementById('filterFreeBtn').addEventListener('click', () => setFilter('free'));
  document.getElementById('filterReservedBtn').addEventListener('click', () => setFilter('reserved'));
  document.getElementById('filterOccupiedBtn').addEventListener('click', () => setFilter('occupied'));
  document.getElementById('dbToggleBtn').addEventListener('click', async () => {
    currentDbMode = currentDbMode === 'prod' ? 'test' : 'prod';
    localStorage.setItem('toolrental-bikes-db-mode', currentDbMode);
    updateDbToggle();
    await loadBikes();
    showToast(currentDbMode === 'test' ? 'TEST adatbázis aktiválva' : 'PROD adatbázis aktiválva');
  });

  setInterval(() => loadBikes(true), 60000);

  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) loadBikes(true);
  });

  updateDbToggle();
  loadBikes();
</script>
</body>
</html>
